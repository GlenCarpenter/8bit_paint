<!DOCTYPE html>
<html>

<head>
  <title>8bit Paint</title>
  <style>
    @import url('https://fonts.googleapis.com/css?family=Press+Start+2P');
  </style>
  <meta name='viewport' content='width=device-width, height=device-height, initial-scale=1, user-scalable=no' />
  <meta property="og:title" content="8bit Paint" />
  <meta property="og:description" content="8bit pixel painting to share with friends!" />
  <meta property="og:image" content="images/block_256.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="256" />
  <meta property="og:image:height" content="256" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="styles/main.css">
  <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico" />
</head>

<body>
  <div id="app-container">
    <div id="banner" class="no-select">
      <h1>8bit Paint</h1>
    </div>

    <!-- Color palette -->
    <div class="no-select" id="palette-container">
      <div class="palette-switcher">
        <button type="button" id="palette-prev" class="palette-chevron no-select"
          aria-label="Previous palette">&#x276E;</button>
        <div class="palette-center">
          <div class="palette-inner">
            <p id="palette-label"></p>
            <div id="palette-row-1" class="palette-row"></div>
            <div id="palette-row-2" class="palette-row"></div>
          </div>
        </div>
        <button type="button" id="palette-next" class="palette-chevron no-select"
          aria-label="Next palette">&#x276F;</button>
      </div>

      <div id="color-options">
        <div class="color-controls-row">
          <div class="custom-picker-group">
            <div id="custom-color-trigger" class="custom-color-square" role="button" tabindex="0"
              aria-label="Use custom color"></div>
            <button type="button" id="open-custom-color-dialog" class="custom-color-open-button no-select"
              aria-haspopup="dialog" aria-controls="custom-color-dialog">Custom<span class="btn-emoji">🎨</span></button>
          </div>
          <label for="checkbox">
            <input type="checkbox" class="grid-box" id="checkbox" checked />
            <span class="label-text no-select">
              Grid
            </span>
          </label>
        </div>

        <div class="color-controls-row">
          <input type="button" class="paint-style button-control selected-paint-style" id="paint-brush" value="🖌️" title="Brush" />
          <input type="button" class="paint-style button-control" id="paint-bucket" value="🪣" title="Pour" />
          <input type="button" class="paint-style button-control" id="paint-fill-h" value="↔️" title="Fill Row" />
          <input type="button" class="paint-style button-control" id="paint-fill-v" value="↕️" title="Fill Column" />
        </div>

        <div class="color-controls-row transform-row">
          <button type="button" class="paint-style button-control" id="paint-picker" title="Color Picker"><img src="public/eyedropper.png" alt="Color Picker" class="tool-icon" /></button>
          <button type="button" class="paint-style button-control" id="transform-rotate-cw" title="Rotate"><img src="public/rotate.png" alt="Rotate Right" class="tool-icon" /></button>
          <button type="button" class="paint-style button-control" id="transform-flip-h" title="Flip Horizontal"><img src="public/flip.png" alt="Flip Horizontal" class="tool-icon" /></button>
          <input type="button" class="transform-btn button-control" id="transform-flip-v" value="🔃" title="Flip Vertical" />
        </div>
      </div>
    </div>

    <!-- Undo controls -->
    <div class="undo-row">
      <button class="btn-revert btn-undo no-select" id="btn-undo">Undo<span class="btn-icon">↺</span>
      </button>
      <button class="btn-revert btn-redo no-select" id="btn-redo">Redo<span class="btn-icon">↻</span>
      </button>
    </div>

    <!-- Coloring area -->
    <div id="color-box"></div>
    <div class="button-row">
      <button class="button-control no-select" id="btn-share">Share <img src="images/share_icon.svg" alt="share" />
      </button>
      <input type="button" class="button-control no-select" id="clear-canvas" value="Clear" />
    </div>
  </div>

  <dialog id="share-dialog" class="share-dialog no-select" aria-label="Share image dialog">
    <div class="share-dialog-content">
      <h2>⭐ Share ⭐</h2>
      <canvas id="share-preview" width="400" height="400"></canvas>
      <div class="share-filters">
        <label for="filter-hue">Hue</label>
        <div class="share-filter-input"><input type="range" id="filter-hue" min="0" max="360" value="0" /></div>
        <label for="filter-saturate">Saturate</label>
        <div class="share-filter-input"><input type="range" id="filter-saturate" min="0" max="200" value="100" /></div>
        <label for="filter-blur">Blur</label>
        <div class="share-filter-input"><input type="range" id="filter-blur" min="0" max="10" value="0" step="0.5" /></div>
        <label for="filter-invert">Invert</label>
        <div class="share-filter-input"><input type="checkbox" id="filter-invert" /></div>
      </div>
      <div class="share-actions">
        <button type="button" id="share-reset" class="button-control">Reset<span>🔄</span></button>
        <button type="button" id="share-send" class="button-control" aria-label="Share">Send<span>🚀</span></button>
      </div>
    </div>
  </dialog>

  <dialog id="custom-color-dialog" class="custom-color-dialog no-select" aria-label="Custom color picker dialog">
    <div class="custom-color-dialog-content">
      <h2>Custom color</h2>
      <div id="color-picker" aria-label="Custom color picker"></div>
      <button type="button" id="close-custom-color-dialog" class="button-control">Done</button>
    </div>
  </dialog>
</body>
<script src="scripts/jquery-3.3.1.min.js"></script>
<script src="scripts/iro.min.js"></script>
<script src="scripts/disableBackButton.js"></script>
<script src="scripts/appStore.js"></script>
<script src="scripts/init.js"></script>
<script defer src="scripts/app.js"></script>

</html>
